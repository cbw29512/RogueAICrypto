name: Daily RogueAI Content + Merch Pipeline

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

concurrency:
  group: rogueai-daily-pipeline-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out trusted source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev

      - name: Install locked npm dependencies
        run: npm ci

      - name: Block high-severity production dependency advisories
        run: npm audit --omit=dev --audit-level=high

      - name: Download approved fonts
        run: node scripts/fonts.mjs --download-only
        env:
          NODE_ENV: production

      - name: Generate candidate content and products
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ROGUEAI }}
          PRINTIFY_API_KEY: ${{ secrets.ROGUEAI_PRINTIFY }}
          NODE_ENV: production
        run: node scripts/generate-content.mjs

      - name: Validate generated-file boundary
        shell: bash
        run: |
          set -euo pipefail
          allowed='^(public/daily-content\.json|scripts/product-history\.json|scripts/rogueai-sayings\.json)$'
          unexpected="$(git status --short | sed -E 's/^.. //' | grep -Ev "$allowed" || true)"
          if [[ -n "$unexpected" ]]; then
            echo 'Generation changed files outside the approved boundary:'
            printf '%s\n' "$unexpected"
            exit 1
          fi

          for file in \
            public/daily-content.json \
            scripts/product-history.json \
            scripts/rogueai-sayings.json; do
            test -f "$file"
            test ! -L "$file"
            test "$(stat -c %s "$file")" -le 10485760
            node -e 'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"))' "$file"
          done

      - name: Upload review-only generated files
        uses: actions/upload-artifact@v4
        with:
          name: rogueai-generated-state
          path: |
            public/daily-content.json
            scripts/product-history.json
            scripts/rogueai-sayings.json
          if-no-files-found: error
          retention-days: 3

  publish-review-branch:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out main without executing repository code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: rogueai-generated-state
          path: generated

      - name: Copy and revalidate approved files
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            public/daily-content.json \
            scripts/product-history.json \
            scripts/rogueai-sayings.json; do
            source_file="generated/$file"
            test -f "$source_file"
            test ! -L "$source_file"
            test "$(stat -c %s "$source_file")" -le 10485760
            node -e 'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"))' "$source_file"
            cp "$source_file" "$file"
          done

      - name: Update draft review pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch='automation/daily-content'
          git fetch origin "$branch" || true
          git checkout -B "$branch" origin/main
          git config user.name 'RogueAI Pipeline'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            public/daily-content.json \
            scripts/product-history.json \
            scripts/rogueai-sayings.json

          if git diff --cached --quiet; then
            echo 'No generated state changes to review.'
            exit 0
          fi

          git commit -m "Review daily pipeline output $(date -u +%Y-%m-%d)"
          git push --force-with-lease origin "HEAD:$branch"

          existing_pr="$(gh pr list --state open --base main --head "$branch" --json number --jq '.[0].number // empty')"
          if [[ -z "$existing_pr" ]]; then
            gh pr create \
              --draft \
              --base main \
              --head "$branch" \
              --title 'Review generated RogueAI daily content' \
              --body 'Generated content and product state are isolated for human review. Merging this pull request is the publication approval gate.'
          else
            gh pr comment "$existing_pr" --body "Pipeline refreshed the generated review branch for $(date -u +%Y-%m-%d)."
          fi
